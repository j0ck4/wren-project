name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  rust:
    name: Rust (fmt · build · test · clippy)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            meson ninja-build pkg-config gettext desktop-file-utils \
            libgtk-4-dev libadwaita-1-dev libglib2.0-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      # Generates src/config.rs from src/config.rs.in so cargo
      # can compile without a full Meson build.
      - name: Configure Meson
        run: meson setup builddir --buildtype=debug

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo build
        run: cargo build --all-targets --locked

      - name: cargo test
        run: cargo test --all-targets --locked

      - name: cargo clippy
        run: cargo clippy --all-targets --locked --no-deps

  flatpak:
    name: Flatpak (smoke build)
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged
    steps:
      - uses: actions/checkout@v4

      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: wren-devel.flatpak
          manifest-path: build-aux/flatpak/io.github.j0ck4.Wren.Devel.json
          cache-key: flatpak-builder-${{ github.sha }}
